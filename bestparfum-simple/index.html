<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BestParfum | Прайс</title>
  <meta name="theme-color" content="#050505">
  <style>
    :root {
      --bg: #050505; --card: #0f0f0f; --text: #f5f5f5; --muted: #888;
      --gold: #c9a227; --gold-light: #ffd700; --border: #222;
      --hit: #ff1a40; --ideal: #ffd700; --warning: #f39c12;
      --pink: #ff69b4; --men-bg: #ffffff; --unisex-bg: #888888;
      --avito: #00AAFF;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding-bottom: 80px;
      background-image: radial-gradient(circle at 50% 0%, #111 0%, #050505 60%);
      overflow-x: hidden; width: 100%;
    }
    
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(5,5,5,0.98); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    
    .header-main {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 12px 8px 8px;
    }
    .logo-wrap {
      width: 80px; height: 80px; border-radius: 50%; overflow: hidden; background: #000;
      border: 2px solid var(--gold); box-shadow: 0 4px 20px rgba(201, 162, 39, 0.3);
      margin-bottom: 6px;
    }
    .logo { width: 100%; height: 100%; object-fit: cover; }
    h1 { margin: 0; font-size: 20px; font-weight: 800; color: #fff; letter-spacing: 0.5px; }
    .subtitle { color: var(--gold); font-size: 9px; font-weight: 600; letter-spacing: 2px; margin: 3px 0 0; text-align: center; }

    .header-info-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 10px 12px; width: 100%; gap: 10px;
    }
    
    .contacts-group { display: flex; flex-direction: column; gap: 6px; align-items: flex-start; flex: 1; min-width: 0; }
    .phone-link {
      font-size: 14px; font-weight: 700; color: var(--gold); text-decoration: none;
      display: flex; align-items: center; gap: 6px; cursor: pointer; background: none; border: none; padding: 0; white-space: nowrap;
    }
    .phone-link:active { opacity: 0.7; }
    .phone-link .copied-msg { color: #25D366; font-size: 11px; margin-left: 4px; display: none; }
    .phone-link.is-copied .number-text { display: none; }
    .phone-link.is-copied .copied-msg { display: inline; }

    .messenger-icons { display: flex; gap: 6px; flex-wrap: wrap; }
    .msg-btn {
      display: flex; align-items: center; gap: 4px; padding: 5px 9px; border-radius: 6px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      transition: 0.2s; text-decoration: none; color: #fff; font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .msg-btn svg, .msg-btn img { width: 16px; height: 16px; flex-shrink: 0; }
    .msg-btn img { border-radius: 3px; }
    .msg-btn:active { transform: scale(0.95); }
    .msg-btn.main { border-color: var(--gold); background: rgba(201,162,39,0.15); color: var(--gold-light); }
    .msg-btn.telegram { background: rgba(42,171,238,0.15); border-color: #2AABEE; color: #2AABEE; }
    .msg-btn.whatsapp { background: rgba(37,211,102,0.15); border-color: #25D366; color: #25D366; }
    .msg-btn.avito { background: rgba(0,170,255,0.15); border-color: var(--avito); color: var(--avito); }

    .qr-group { display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; }
    .qr-box {
      width: 70px; height: 70px; background: #fff; border-radius: 10px;
      padding: 6px; display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .qr-box img { width: 100%; height: 100%; object-fit: contain; }
    .qr-placeholder { font-size: 8px; color: #000; text-align: center; font-weight: bold; }
    .qr-label { font-size: 9px; color: var(--muted); margin-top: 3px; text-transform: uppercase; font-weight: 600; }

    header.compact .header-main { display: none; }
    header.compact .header-info-bar { padding: 6px 10px; justify-content: center; }
    header.compact .contacts-group, header.compact .qr-group, 
    header.compact .price-grid, header.compact .warning-box { display: none; }

    .warning-box {
      background: rgba(243, 156, 18, 0.1); border: 1px solid rgba(243, 156, 18, 0.3);
      border-radius: 6px; padding: 6px 10px; margin: 0 auto 8px; width: calc(100% - 20px);
      font-size: 11px; color: var(--warning); font-weight: 600; text-align: center;
    }
    .price-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
      padding: 0 10px 12px; width: calc(100% - 20px); margin: 0 auto;
    }
    .price-cell { background: var(--card); padding: 8px 4px; border-radius: 8px; text-align: center; border: 1px solid #1a1a1a; position: relative; }
    .price-cell .vol { display: block; color: var(--muted); font-size: 10px; margin-bottom: 2px; }
    .price-cell .cost { display: block; color: #fff; font-size: 13px; font-weight: 700; }
    .price-cell.hit { border-color: var(--hit); background: #1a0a0f; }
    .price-cell.ideal { border-color: var(--ideal); background: #1a170a; }
    .badge { position: absolute; top: -4px; right: 2px; font-size: 7px; font-weight: 800; padding: 1px 4px; border-radius: 3px; }
    .badge.hit { background: var(--hit); color: #fff; }
    .badge.ideal { background: var(--ideal); color: #000; }

    .controls { padding: 8px 10px 0; width: 100%; }
    .search-wrapper { position: relative; display: flex; align-items: center; }
    .search-box {
      width: 100%; padding: 10px 12px; background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; color: #fff; font-size: 13px; outline: none;
    }
    .search-box:focus { border-color: var(--gold); }
    .search-box::placeholder { color: #555; }
    .counter {
      position: absolute; right: 8px; font-size: 10px; font-weight: 600; color: var(--gold);
      background: rgba(201, 162, 39, 0.1); padding: 2px 6px; border-radius: 4px;
      border: 1px solid rgba(201, 162, 39, 0.3); pointer-events: none;
    }
    
    .filters-wrapper { 
      display: flex; justify-content: flex-start; margin-top: 8px; padding-bottom: 8px; 
      overflow-x: auto; -webkit-overflow-scrolling: touch; 
      scrollbar-width: none;
    }
    .filters-wrapper::-webkit-scrollbar { display: none; }
    .filters {
      display: inline-flex; gap: 5px; padding: 3px;
      background: rgba(255, 255, 255, 0.03); border-radius: 18px; border: 1px solid rgba(255, 255, 255, 0.05);
      flex-shrink: 0;
    }
    .chip {
      padding: 6px 10px; border-radius: 14px; font-size: 11px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: all 0.2s;
      background: transparent; color: var(--muted); border: 1px solid transparent; flex-shrink: 0;
    }
    .chip:active { transform: scale(0.95); }
    .chip.all.active { background: var(--gold); color: #000; box-shadow: 0 2px 8px rgba(201,162,39,0.3); }
    .chip.women.active { background: var(--pink); color: #000; box-shadow: 0 2px 8px rgba(255,105,180,0.3); }
    .chip.men.active { background: var(--men-bg); color: #000; box-shadow: 0 2px 8px rgba(255,255,255,0.2); }
    .chip.unisex.active { background: var(--unisex-bg); color: #000; box-shadow: 0 2px 8px rgba(136,136,136,0.3); }
    .chip.hits.active { background: linear-gradient(135deg, #ff6b6b, #ff8e53); color: #fff; box-shadow: 0 2px 8px rgba(255,107,107,0.4); }
    .chip.sale.active { background: linear-gradient(135deg, #4facfe, #00f2fe); color: #000; box-shadow: 0 2px 8px rgba(79,172,254,0.4); }

    #list { padding: 0 10px; width: 100%; margin: 0 auto; display: grid; gap: 10px; }
    .brand-group { background: var(--card); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
    .brand-header {
      background: linear-gradient(90deg, rgba(201,162,39,0.1), transparent);
      padding: 7px 10px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #1a1a1a;
    }
    .brand-name { color: var(--gold); font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
    .brand-count { color: var(--muted); font-size: 9px; }
    .brand-items { padding: 2px; }
    .item { padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1a; }
    .item:last-child { border-bottom: none; }
    .name { font-size: 13px; font-weight: 500; color: #eee; }
    .gender-badge {
      display: flex; align-items: center; gap: 3px; padding: 3px 7px; border-radius: 10px;
      font-size: 9px; font-weight: 600; white-space: nowrap; flex-shrink: 0;
    }
    .gender-badge.women { background: rgba(255, 105, 180, 0.1); color: #ff69b4; border: 1px solid rgba(255, 105, 180, 0.2); }
    .gender-badge.men { background: rgba(255, 255, 255, 0.05); color: #aaa; border: 1px solid rgba(255, 255, 255, 0.1); }
    .gender-badge.unisex { background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); }
    .empty { text-align: center; color: var(--muted); padding: 30px 15px; }
    .clear-btn { text-align: center; margin: 8px 0; font-size: 10px; color: var(--gold); cursor: pointer; text-decoration: underline; display: none; }

    .fab-top {
      position: fixed; bottom: 15px; right: 15px;
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--gold); color: #000; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      font-size: 18px; cursor: pointer; z-index: 999;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: translateY(20px); transition: all 0.3s; pointer-events: none;
    }
    .fab-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .fab-top:active { transform: scale(0.9); }

    @media (min-width: 480px) {
      .logo-wrap { width: 90px; height: 90px; }
      h1 { font-size: 22px; }
      .subtitle { font-size: 10px; }
      .phone-link { font-size: 15px; }
      .msg-btn { padding: 6px 11px; font-size: 12px; }
      .msg-btn svg, .msg-btn img { width: 17px; height: 17px; }
      .qr-box { width: 80px; height: 80px; }
      .price-cell .cost { font-size: 14px; }
      .name { font-size: 14px; }
      .brand-name { font-size: 11px; }
      .chip { padding: 7px 12px; font-size: 12px; }
    }

    @media (min-width: 640px) {
      .header-main { padding: 15px 10px 5px; }
      .logo-wrap { width: 90px; height: 90px; margin-bottom: 8px; }
      h1 { font-size: 24px; }
      .subtitle { font-size: 11px; }
      .header-info-bar { max-width: 600px; margin: 0 auto; padding: 10px 15px 15px; }
      .phone-link { font-size: 16px; }
      .msg-btn { padding: 6px 12px; font-size: 12px; }
      .msg-btn svg, .msg-btn img { width: 18px; height: 18px; }
      .qr-box { width: 90px; height: 90px; padding: 8px; }
      .warning-box { max-width: 600px; padding: 8px; font-size: 11px; }
      .price-grid { max-width: 600px; padding: 0 10px 15px; gap: 6px; }
      .controls { max-width: 600px; margin: 0 auto; padding: 10px 15px 0; }
      .search-box { padding: 12px 14px; font-size: 14px; }
      .chip { padding: 8px 14px; font-size: 12px; }
      #list { max-width: 600px; padding: 0 15px; gap: 12px; }
      .item { padding: 12px; }
      .name { font-size: 14px; }
      .brand-header { padding: 8px 12px; }
      .brand-name { font-size: 11px; }
    }
  </style>
</head>

  <script>
    function copyPhone() {
      const phone = '+79998082025';
      const btn = document.getElementById('phoneBtn');
      navigator.clipboard.writeText(phone).then(() => {
        btn.classList.add('is-copied');
        setTimeout(() => { btn.classList.remove('is-copied'); }, 2000);
      }).catch(() => {
        const ta = document.createElement('textarea'); ta.value = phone;
        document.body.appendChild(ta); ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        btn.classList.add('is-copied');
        setTimeout(() => btn.classList.remove('is-copied'), 2000);
      });
    }

    let data = [], currentFilter = 'all', searchQuery = '';
    const genderLabels = { women: { icon: '♀', text: 'Жен' }, men: { icon: '♂', text: 'Муж' }, unisex: { icon: '⚥', text: 'Уни' } };
    const header = document.getElementById('mainHeader');
    const fabTop = document.getElementById('fabTop');

    const hitsList = [
      'Guidance', 'Sunshine', 'Tilia', 'Ganymede', 'Sauvage', 
      'Miss Dior Blooming Bouquet', 'Acqua di Giò', 'Stronger With You', 
      'My Way', 'Mandarine Basilic', 'Psychedelic Love', 'Rehab', 
      'Side Effect', 'Good Girl Gone Bad', 'Angels\' Share', 'Santal 33', 
      'Symphony', 'L\'Immensité', 'Marfa', 'Eros'
    ];

    const saleList = [];

    function updateHeaderState() {
      const hasFilters = currentFilter !== 'all' || searchQuery.length > 0;
      if (hasFilters) {
        header.classList.add('compact');
      } else {
        header.classList.remove('compact');
      }

      if (window.scrollY > 300) { fabTop.classList.add('visible'); }
      else { fabTop.classList.remove('visible'); }
    }

    window.addEventListener('scroll', () => {
      if (window.scrollY > 300) fabTop.classList.add('visible');
      else fabTop.classList.remove('visible');
    }, { passive: true });

    fetch('data.json').then(r => r.json()).then(json => { data = json; render(); });

    function setFilter(type, el) {
      currentFilter = type;
      document.querySelectorAll('.filters .chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      render();
    }

    document.getElementById('search').addEventListener('input', e => { searchQuery = e.target.value.trim(); render(); });

    function resetAll() {
      currentFilter = 'all'; searchQuery = '';
      document.getElementById('search').value = '';
      document.querySelectorAll('.filters .chip').forEach(c => c.classList.remove('active'));
      document.querySelector('.chip.all').classList.add('active');
      render();
    }

    function render() {
      const list = document.getElementById('list'), clearBtn = document.getElementById('clearBtn');
      list.innerHTML = '';
      const query = searchQuery.toLowerCase();
      
      const filtered = data.filter(item => {
        const matchSearch = !query || item.brand.toLowerCase().includes(query) || item.name.toLowerCase().includes(query);
        if (!matchSearch) return false;
        
        if (currentFilter === 'all') return true;
        if (currentFilter === 'women') return item.gender === 'women';
        if (currentFilter === 'men') return item.gender === 'men';
        if (currentFilter === 'unisex') return item.gender === 'unisex';
        if (currentFilter === 'hits') return hitsList.some(h => item.name.toLowerCase().includes(h.toLowerCase()) || item.brand.toLowerCase().includes(h.toLowerCase()));
        if (currentFilter === 'sale') return saleList.some(s => item.name.toLowerCase().includes(s.toLowerCase()) || item.brand.toLowerCase().includes(s.toLowerCase()));
        
        return true;
      });

      document.getElementById('found').textContent = filtered.length;
      document.getElementById('total').textContent = data.length;
      clearBtn.style.display = (currentFilter !== 'all' || searchQuery) ? 'block' : 'none';
      updateHeaderState();

      if (filtered.length === 0) { list.innerHTML = '<div class="empty">Ничего не найдено 😔</div>'; }
      else {
        const grouped = {};
        filtered.forEach(item => { if(!grouped[item.brand]) grouped[item.brand] = []; grouped[item.brand].push(item); });
        Object.keys(grouped).sort().forEach(brand => {
          const groupDiv = document.createElement('div'); groupDiv.className = 'brand-group';
          groupDiv.innerHTML = `<div class="brand-header"><span class="brand-name">${brand}</span><span class="brand-count">${grouped[brand].length}</span></div><div class="brand-items"></div>`;
          const itemsDiv = groupDiv.querySelector('.brand-items');
          grouped[brand].forEach(item => {
            const g = genderLabels[item.gender] || genderLabels.unisex;
            const div = document.createElement('div'); div.className = 'item';
            div.innerHTML = `<div class="info"><span class="name">${item.name}</span></div><div class="gender-badge ${item.gender}"><span class="icon">${g.icon}</span><span>${g.text}</span></div>`;
            itemsDiv.appendChild(div);
          });
          list.appendChild(groupDiv);
        });
      }
    }
    updateHeaderState();
  </script>
</body>
</html>
